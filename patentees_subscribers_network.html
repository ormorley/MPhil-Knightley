<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patentees &amp; Subscribers Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ffffff;
  color: #1a1a2e;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  height: 100vh;
}

#container { position: relative; width: 100vw; height: 100vh; }
svg { width: 100%; height: 100%; display: block; }

#controls {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 12px;
  padding: 20px;
  width: 290px;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  z-index: 10;
}

#controls h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 2px;
  letter-spacing: 0.3px;
}

#controls .subtitle {
  font-size: 11px;
  color: #777;
  margin-bottom: 16px;
  font-weight: 300;
}

.control-group { margin-bottom: 14px; }

.control-group label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: #555;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.slider-row { display: flex; align-items: center; gap: 10px; }

.slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: #d4d4d4;
  border-radius: 2px;
  outline: none;
}

.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #6b3a2a;
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.slider-value {
  font-size: 13px;
  font-weight: 600;
  color: #6b3a2a;
  min-width: 20px;
  text-align: right;
}

#search-box {
  width: 100%;
  background: #f5f5f5;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 12px;
  color: #1a1a2e;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s;
}

#search-box:focus { border-color: #6b3a2a; }
#search-box::placeholder { color: #aaa; }

.company-toggles { display: flex; flex-direction: column; gap: 5px; }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}

.toggle-row:hover { background: rgba(0,0,0,0.03); }

.toggle-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 2px solid;
  transition: all 0.2s;
}

.toggle-dot.active { box-shadow: 0 0 6px; }

.toggle-label { font-size: 11.5px; font-weight: 400; color: #2a2a2a; }
.toggle-count { margin-left: auto; font-size: 10px; color: #999; font-weight: 300; }

#stats {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  padding: 12px 16px;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  z-index: 10;
}

#stats span { font-size: 12px; color: #777; font-weight: 300; }
#stats span strong { color: #6b3a2a; font-weight: 600; }

#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(255,255,255,0.97);
  border: 1px solid #c0c0c0;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #1a1a2e;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.12s;
  max-width: 420px;
}

#tooltip .tip-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 4px;
}

#tooltip .tip-companies { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

#tooltip .tip-tag {
  font-size: 9.5px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}

#tooltip .tip-cite {
  margin-top: 6px;
  font-size: 11px;
  color: #555;
  line-height: 1.5;
  border-top: 1px solid #e0e0e0;
  padding-top: 6px;
}

.link { stroke-opacity: 0.3; stroke-width: 1; }
.link.highlighted { stroke-opacity: 0.85; stroke-width: 2.5; }

.node-person { cursor: grab; }
.node-person:active { cursor: grabbing; }
.node-company { cursor: grab; }
.node-company:active { cursor: grabbing; }

.company-label {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  fill: #fff;
  text-anchor: middle;
  pointer-events: none;
  font-size: 13px;
  paint-order: stroke;
  stroke: rgba(0,0,0,0.25);
  stroke-width: 3px;
}

.dimmed { opacity: 0.06; }

#toggle-controls {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 11;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  font-size: 18px;
  color: #555;
  transition: background 0.15s;
  user-select: none;
}

#toggle-controls:hover { background: #f0f0f0; }

#controls.hidden {
  transform: translateX(-310px);
  opacity: 0;
  pointer-events: none;
}

#controls {
  transition: transform 0.3s ease, opacity 0.25s ease;
}
</style>
</head>
<body>
<div id="container">
  <svg id="graph"></svg>

  <div id="toggle-controls" title="Toggle controls">&#9776;</div>

  <div id="controls">
    <h1>Patentees &amp; Subscribers</h1>
    <div class="subtitle">Selected patentees and subscribers of six 17th century colonial enterprises.</div>

    <div class="control-group">
      <label>Search</label>
      <input type="text" id="search-box" placeholder="Type a name...">
    </div>

    <div class="control-group">
      <label>Min. Companies</label>
      <div class="slider-row">
        <input type="range" id="min-slider" min="1" max="6" value="1" step="1">
        <span class="slider-value" id="min-value">1</span>
      </div>
    </div>

    <div class="control-group">
      <label>Show Companies</label>
      <div class="company-toggles" id="toggles"></div>
    </div>
  </div>

  <div id="stats">
    <span>Showing <strong id="stat-nodes">0</strong> people &middot; <strong id="stat-links">0</strong> links</span>
  </div>

  <div id="tooltip"></div>
</div>

<script>
// Toggle controls visibility
document.getElementById('toggle-controls').addEventListener('click', function() {
  const controls = document.getElementById('controls');
  controls.classList.toggle('hidden');
  this.innerHTML = controls.classList.contains('hidden') ? '&#9776;' : '&#10005;';
});

const COMPANIES = {

  "Virginia":          { color: "#2d6a4f" },
  "Somers Island":     { color: "#5a3e9e" },
  "Massachusetts Bay": { color: "#b07d10" },
  "Connecticut River": { color: "#1a6b8a" },
  "Council for New England": { color: "#8c3553" }
};

const CITATIONS = {
  "Providence Island": 'Kupperman, Karen Ordahl, \u2018Providence Island Company Members\u2019, in <i>Providence Island, 1630\u20131641: The Other Puritan Colony</i> (Cambridge: Cambridge University Press, 1993), pp. 357\u201360.',
  "Virginia": 'Kingsbury, Susan Myra (ed.), <i>The Records of the Virginia Company of London</i>, 4 vols. (Washington, DC: Library of Congress, 1906\u201335).',
  "Somers Island": 'Lefroy, John Henry, <i>Memorials of the Discovery and Early Settlement of the Bermudas or Somers Islands, 1515\u20131685</i>, vol. I (Bermuda: The Bermuda Historical Society and The Bermuda National Trust, 1981).',
  "Massachusetts Bay": 'Shurtleff, Nathaniel B. (ed.), <i>Records of the Governor and Company of the Massachusetts Bay in New England</i> (Boston: W. White, 1854).',
  "Connecticut River": 'Hoadly, C. J., <i>The Warwick Patent</i> (Hartford: Case, Lockwood &amp; Brainard, 1902).',
  "Council for New England": 'Thorpe, Francis Newton (ed.), \u2018The Charter of New England: 1620\u2019, in <i>The Federal and State Constitutions, Colonial Charters, and Other Organic Laws of the States, Territories, and Colonies Now or Heretofore Forming the United States of America</i> (Washington, DC: Government Printing Office, 1909); Deane, Charles (ed.), <i>Records of the Council for New England</i> (Cambridge, MA: Press of John Wilson &amp; Son, 1867).'
};

const raw = {
"Providence Island": ["William Ball","Gabriel Barbor","Thomas Barnardiston","Sir Thomas Barrington","Godfrey Bosvile","Sir Thomas Cheeke","Henry Darley","John Dyke","James Fiennes","Lord Saye and Sele","Gregory Gawsell","Sir Gilbert Gerard","John Graunt","Lord Brooke","John Gurdon","Sir Edward Harwood","Richard Knightley","John Michell","Lord Mandeville","Sir Edmond Moundeford","John Pym","Earl of Holland","Sir Nathaniel Rich","Earl of Warwick","John Robartes","Sir Benjamin Rudyerd","Oliver St. John","Christopher Sherland","Thomas Symons","John Upton","Sir William Waller","William Woodcock","William Jessop"],

"Virginia": ["John Ferrar","Sir William Fleetwood","Sir George Calvert","'Mr Sherwin'","Sir Thomas Denton","Sir Edward Conway","Sir Thomas Grantham","Sir Charles Barkly","Sir Edward Cecil","'Mr Art'","Sir Robert Heath","Thomas Trevor","Sir John Arundell","James Bag","Sir Nicholas Tufton","Sir John Walter","Sir George Goring","Sir John Stradling","Robert Bateman","Sir Baptist Hicks","Martin Bond","Sir Arthur Ingram","Sir Thomas Middleton","'Mr Lewson'","Sir Robert Mansfield","Thomas Bond","Sir Dudley Digges","Sir George Moore","Sir Humphrey May","Sir John Cutts","Sir John Ratcliff","Sir Edmund Bowyer","George Garrett","Sir Henry Fane","Sir Heneage Finch","John Delbridge","Edward Spencer","Sir Thomas Jermin","Sir Philip Cary","Sir James Perrot","Lord Wriothesley","William Oxenbridge","John Moore","John Drake","Maurice Abbott","'Mr Dyot'","Sir John Scudamore","Sir Oliver Cromwell","Sir Arthur Harris","Richard Knightley","Sir Arthur Mannering","Sir Robert Cotton","Sir John Saint John","John Selden","Earl of Warwick","'Mr Harris'","Sir Nathaniel Rich","Sir Henry Mileme","'Mr Worsman'","Sir Humphrey Hamford","'Mr Copse'","Sir Samuel Argall","'Mr Binge'","Sir Thomas Wrath","'Mr May'","'Mr Cowell'","Sir Thomas Smith","Robert Gore","Sir Thomas Button","'Mr Wilkinson'","Sir John Culpeper","John Barnard","Sir Thomas Cheeke","'Mr Moore'","Sir Thomas Hewitt","'Mr Man'","Edward Lukin","Sir Ferdinando Gorge","Abraham Chamberlin","Sir John Wolstenholme","John West","'Mr Alderman Johnson'","'Mr Powston'","'Mr Doctor Medust'","Elias Roberts","'Mr Mould'","'Mr Bateman'","'Mr Pennington'","'Mr Gibbs'","'Captain Turner'","'Mr Leate'","George Tucker","Nathaniel Butler","'Mr Dorrell'","'Mr Llewellyn'","'Mr Tickner'","'Mr Bell'","Edward Palmer","'Mr Stiles'","'Mr Baynham'","William Palmer","'Mr Willmore'","Richard Edwards","Thomas Jadwin","'Mr Moorer'","'Mr Nevell'","John Dike","'Mr Rogers Junior'","George Smith Grocer","John Woodall","Robert Smith Under-Chamberlain","'Mr Sparrow'","'Mr Man Junior'","'Mr Canning'","'Mr Roberts Junior'","Humphrey Slany","'Mr West'","'Mr Thayer'","'Mr Pearce'","Edward Bennit","'Mr Cason'","'Mr Fesant'","'Mr Robins'","'Mr Wrote'","Thomas Wale","'Mr Steward'","'Mr Lawes'","John Wrothe","'Mr Townsend'","'Mr Palavisine'","'Mr Essington'","Christopher Barron","Edward Ditchfield","Robert Johnson","John Dyke","Sir Thomas Barrington","Gabriel Barbor","Sir Gilbert Gerard","Sir Edward Harwood","Earl of Holland","Oliver St. John","Matthew Cradock","Richard Bushrod","Simon Whetcombe","Sir Richard Saltonstall","Isaac Johnson","John Humfry","Sir Henry Rosewell","George Harwood","George Sandys","Sir Edwin Sandys","Nicholas Farrer","Sir John Danvers","John Farrer","Thomas Kiteley","Thomas Wheatley","Richard Caswell","Thomas Shepherd","John Cuffe","Gabriel Barber","William Deerblock","Anthony Withers","George Scott","Edward Hackett","John Kirrell","Thomas Morris","William Webb","Richard Bull","William Nicholls","Patrick Copeland","William Browne","George Smyth","Richard Tomlins","Edward Brewster","William Ewens","Thomas Winston","George Swinhowe","Edward Ryder","Gilbert Morewood","Edmund Morgan"],

"Somers Island": ["Countess of Bedford","Lord Cavendish","Lord Paget","Earl of Pembroke","Earl of Southampton","Sir Anthony Aucher","Sir Lionel Cranfield","Sir Dudley Digges","Sir Richard Grobham","Sir Lawrence Hide","Sir Thomas Hogan","Sir John Howard","Sir Robert Mansell","Sir John Mericke","Sir Robert Rich","Sir Edwin Sandys","Sir Samuel Sandys","Sir Richard Smith","Sir Thomas Smith","Sir John Watts","Sir Ralph Winwood","William Caraway","Richard Chamberlaine","Jeremy Heydon","Nicholas Hide","Richard Martin","George Thorpe","John Walter","John Wolstenholme","John Wrath","Maurice Abbott","Anthony Abby","William Adderley","Charles Anthony","John Banks","John Barnard","George Barkeley","Christopher Baron","Nicholas Benson","John Bretton","Edward Bishop","Arthur Brainfield","William Campage","Abraham Cartwright","Richard Caswell","Abraham Chamberlaine","George Chamberlaine","Thomas Church","Christopher Clitherow","Allen Cotton","Thomas Conell","Abraham Dawes","Gideon De Laurie","John Delbridge","John Dike","Edward Ditchfield","Richard Edwards","George Etheridge","Nicholas Exton","Nicholas Farrer","William Fellgate","John Fletcher","Edward Fletcher","John Gearing","Francis Giles","Robert Gore","William Greenwell","George Haleman","Ralph Hamer","Leonard Harwood","John Herne","John Heyward","Anthony Hinton","John Hodges","Philip Jacobson","Thomas Jadwin","Thomas John","Robert Johnson","John Kerell","Ralph Kinge","Thomas Lewis","Edward Lukin","Richard Maplesdon","Edward Martin","Richard Mercer","William Nicholls","Thomas Norcott","Robert Offley","John Osborn","William Palmer","William Payne","Robert Phipps","Richard Poulson","Hildebrand Prason","William Quick","George Rich","Elias Roberts","Richard Rogers","Edmund Scott","George Scott","Matthew Shepherd","Cleophas Smith","George Smith","Robert Smith","Warren Smith","Abraham Speckhardie","George Swinhowe","Richard Tomlins","Henry Tymberdale","Thomas Wale","Rice Webb","Thomas Webb","William Webster","John Weld","William Welby","John West","Thomas Wheatley","John Woodall","Gabriel Barbor","John Dyke","Lord Saye","Sir Gilbert Gerard","John Graunt","Sir Edward Harwood","Richard Knightley","John Pym","Earl of Holland","Sir Nathaniel Rich","Earl of Warwick","Sir Benjamin Rudyerd"],

"Massachusetts Bay": ["Thomas Adams","Samuel Aldersey","Richard Andrewes","Thomas Andrewes","Henry Archer","Andrew Arnold","William Backhouse","Daniel Ballard","Sir Nathaniel Barnardiston","'Mr Bateman'","Richard Bellingham","'Mr Bilson'","John Bowles","Job Bradshaw","Joseph Bradshaw","Simon Bradstreet","Sir William Brereton","Francis Bridges","Francis Bright","John Browne","Kellam Browne","Samuel Browne","'Mr Burnell'","Richard Bushrod","'Mrs A. C.'","Joseph Caron","'Mr Clark'","William Coddington","William Colibron","Samuel Cole","Edward Cook","Christopher Coulson","Matthew Cradock","George Foxcroft","John Glover","Josse Glover","Thomas Goffe","John Goodwin","Anne Harvey","George Harwood","Thomas Hewson","Francis Higginson","Joseph Hills","Daniel Hodson","Atherton Hough","William Hubbard","John Humfry","Thomas Hutchins","Edward Ironside","Sir Brian Janson","Isaac Johnson","Robert Keane","Francis Kirby","Thomas Leverett","Roger Ludlowe","John Malbon","Nathaniel Manesty","Abraham Mellows","Thomas Marsh","Peter Milburne","Matthias Nicholls","Increase Nowell","Philip Nye","Joseph Oldfield","Abraham Palmer","'Mr Paynter'","Herbert Pelham","'Mr Pemberton'","William Perkins","Richard Perry","Hugh Peter","George Phillips","John Pocock","Thomas Puliston","William Pyncheon","John Revell","Sir Henry Rosewell","Edward Rossiter","Owen Rowe","Sir Richard Saltonstall","Samuel Sharpe","Thomas Sharpe","Samuel Skelton","John Smyth","Thomas Southcote","John Spenser","William Spurstowe","Thomas Steevens","Elias Stileman","Richard Tuffneale","Samuel Vassall","William Vassall","John Venn","Thomas Wade","Thomas Waldegrave","Henry Waller","Nathaniel Ward","'Mr Warren'","George Way","Francis Webbe","Nicholas West","Simon Whetcombe","Charles Whichcote","Edmund White","John White","Richard White","Daniel Winch","John Winthrop","'Mr Woodgate'","Nathaniel Wright","Sir John Yonge","James Young","Richard Young","Earl of Warwick","John Endecott","Theophilus Eaton","Sir Nathaniel Rich"],

"Connecticut River": ["Lord Saye and Sele","Lord Brooke","Lord Rich","Earl of Warwick","Charles Fiennes","Sir Nathaniel Rich","Sir Richard Saltonstall","Richard Knightley","John Pym","John Hampden","John Humphrey","Herbert Pelham","Henry Lawrence","Henry Darley","Sir Arthur Haselrig","George Fenwick","Lion Gardiner","Sir Matthew Boynton","Edward Hopkins","Robert Barrington","Philip Nye","'Mr Jessup'"],

"Council for New England": ["Duke of Lennox","Duke of Buckingham","Marquess Hamilton","Earl of Pembroke","Earl of Arundel","Earl of Holderness","Earl of Hathe","Earl of Southampton","Earl of Salisbury","Earl of Warwick","Earl of Stirling","Earl of Somerset","Viscount Haddington","Baron Zouche","Baron Sheffield","Baron Gorges","Lord Great Chamberlain","Sir Edward Seymour","Sir Robert Mansell","Sir Edward Zouch","Sir Dudley Digges","Sir Thomas Roe","Sir Ferdinando Gorges","Sir Francis Popham","Baron Cobham","Sir Thomas Gates","Sir Richard Hawkins","Sir Richard Edgcombe","Sir Allen Apsley","Sir Warwick Hele","Sir Richard Catchmay","Sir John Bourchier","Sir Nathaniel Rich","Sir Edward Giles","Sir Giles Mompesson","Sir Thomas Wroth","Sir Henry Spelman","Sir Kenelm Digby","Sir Christopher Garner","Dr Matthew Sutcliffe","Dr Barnabe Goche","Captain Samuel Argall","Captain Robert Gorges","'Captain Love'","'Captain Chudley'","'Captain Masson'","'Captain Wiggin'","'Mr Trear'","'Mr Sherly'","'Mr Peirce'","'Mr Delbordge'","Abraham Jennings","Robert Heath","Henry Bourchier","John Drake","Raleigh Gilbert","George Chudley","Thomas Hamon","John Argall","Robert Aldworth","Gyles Elbridge","John Gorges","Walter Norton","Thomas Coppin","Joel Woolsey","George Norton","Robert Rainsford","Seth Bull","Dixie Bull","Matthew Bradley"]
};

// Build person map
const personMap = {};
for (const [comp, members] of Object.entries(raw)) {
  for (const name of members) {
    if (!personMap[name]) personMap[name] = { name, companies: new Set() };
    personMap[name].companies.add(comp);
  }
}
const allPersons = Object.values(personMap).map(p => ({ name: p.name, companies: [...p.companies], count: p.companies.size }));

let activeCompanies = new Set(Object.keys(COMPANIES));
let minCompanies = 1;
let searchTerm = "";

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph")
  .attr("viewBox", [0, 0, width, height])
  .call(d3.zoom().scaleExtent([0.15, 6]).on("zoom", ({ transform }) => g.attr("transform", transform)))
  .on("dblclick.zoom", null);

const g = svg.append("g");
const linkGroup = g.append("g");
const nodeGroup = g.append("g");
const tooltip = d3.select("#tooltip");

// Toggles
const togglesDiv = d3.select("#toggles");
for (const [name, data] of Object.entries(COMPANIES)) {
  const row = togglesDiv.append("div").attr("class", "toggle-row").attr("data-company", name);
  row.append("div").attr("class", "toggle-dot active")
    .style("border-color", data.color).style("background", data.color).style("box-shadow", `0 0 6px ${data.color}`);
  row.append("span").attr("class", "toggle-label").text(name);
  const count = new Set(raw[name]).size;
  row.append("span").attr("class", "toggle-count").text(count);
  row.on("click", function() {
    if (activeCompanies.has(name)) {
      activeCompanies.delete(name);
      d3.select(this).select(".toggle-dot").classed("active", false).style("background", "transparent").style("box-shadow", "none");
    } else {
      activeCompanies.add(name);
      d3.select(this).select(".toggle-dot").classed("active", true).style("background", data.color).style("box-shadow", `0 0 6px ${data.color}`);
    }
    update();
  });
}

d3.select("#min-slider").on("input", function() {
  minCompanies = +this.value;
  d3.select("#min-value").text(this.value);
  update();
});

d3.select("#search-box").on("input", function() {
  searchTerm = this.value.toLowerCase();
  update();
});

let simulation;

function update() {
  const filtered = allPersons.filter(p => {
    const relevant = p.companies.filter(c => activeCompanies.has(c));
    if (relevant.length === 0) return false;
    if (p.count < minCompanies) return false;
    if (searchTerm && !p.name.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  const usedCompanies = new Set();
  filtered.forEach(p => p.companies.forEach(c => { if (activeCompanies.has(c)) usedCompanies.add(c); }));

  const cArr = [...usedCompanies];
  const cx = width / 2, cy = height / 2;
  const spread = Math.min(width, height) * 0.28;

  const companyNodes = cArr.map((c, i) => {
    const angle = (i / cArr.length) * Math.PI * 2 - Math.PI / 2;
    return {
      id: `company_${c}`, name: c, type: "company", color: COMPANIES[c].color,
      x: cx + Math.cos(angle) * spread, y: cy + Math.sin(angle) * spread
    };
  });

  const personNodes = filtered.map(p => ({
    id: `person_${p.name}`, name: p.name, type: "person", count: p.count,
    companies: p.companies.filter(c => activeCompanies.has(c))
  }));

  const nodes = [...companyNodes, ...personNodes];
  const links = [];
  personNodes.forEach(p => {
    p.companies.forEach(c => {
      links.push({ source: p.id, target: `company_${c}`, color: COMPANIES[c].color });
    });
  });

  d3.select("#stat-nodes").text(personNodes.length);
  d3.select("#stat-links").text(links.length);

  if (simulation) simulation.stop();

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(160).strength(0.25))
    .force("charge", d3.forceManyBody().strength(d => d.type === "company" ? -900 : -25))
    .force("center", d3.forceCenter(cx, cy).strength(0.04))
    .force("collision", d3.forceCollide().radius(d => d.type === "company" ? 42 : 5))
    .alphaDecay(0.018);

  // Links
  linkGroup.selectAll("line").remove();
  const linkSel = linkGroup.selectAll("line").data(links).enter().append("line")
    .attr("class", "link").attr("stroke", d => d.color);

  // Nodes
  nodeGroup.selectAll("g.node").remove();
  const nodeSel = nodeGroup.selectAll("g.node").data(nodes, d => d.id).enter().append("g").attr("class", "node");

  nodeSel.each(function(d) {
    const el = d3.select(this);
    if (d.type === "company") {
      el.append("circle").attr("r", 32).attr("fill", d.color)
        .attr("class", "node-company").attr("opacity", 0.95)
        .attr("stroke", "#333").attr("stroke-width", 2).attr("stroke-opacity", 0.3);
      const words = d.name.split(" ");
      if (words.length <= 2) {
        el.append("text").attr("class", "company-label").attr("dy", "0.35em").text(d.name);
      } else {
        el.append("text").attr("class", "company-label").attr("dy", "-0.2em").text(words.slice(0, 2).join(" "));
        el.append("text").attr("class", "company-label").attr("dy", "1.1em").text(words.slice(2).join(" "));
      }
    } else {
      el.append("circle").attr("class", "node-person")
        .attr("r", d => 2.5 + d.count * 2)
        .attr("fill", d => d.companies.length > 1 ? "#6b3a2a" : COMPANIES[d.companies[0]].color)
        .attr("opacity", 0.85)
        .attr("stroke", "#fff").attr("stroke-width", 0.7);
    }
  });

  // Drag
  const drag = d3.drag()
    .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.1).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); if (d.type !== "company") { d.fx = null; d.fy = null; } });

  nodeSel.call(drag);

  // Hover
  nodeSel.on("mouseover", (event, d) => {
    if (d.type === "person") {
      const connected = new Set(d.companies);
      linkSel.classed("highlighted", l => { const s = typeof l.source === 'object' ? l.source.id : l.source; return s === d.id; })
        .classed("dimmed", l => { const s = typeof l.source === 'object' ? l.source.id : l.source; return s !== d.id; });
      nodeSel.classed("dimmed", n => {
        if (n.id === d.id) return false;
        if (n.type === "company" && connected.has(n.name)) return false;
        return true;
      });
      let html = `<div class="tip-name">${d.name}</div><div class="tip-companies">`;
      d.companies.forEach(c => { html += `<span class="tip-tag" style="background:${COMPANIES[c].color}18; color:${COMPANIES[c].color}; border:1px solid ${COMPANIES[c].color}44">${c}</span>`; });
      html += `</div>`;
      tooltip.html(html).style("opacity", 1);
    } else {
      const connIds = new Set();
      links.forEach(l => { const t = typeof l.target === 'object' ? l.target.id : l.target; const s = typeof l.source === 'object' ? l.source.id : l.source; if (t === d.id) connIds.add(s); });
      linkSel.classed("highlighted", l => { const t = typeof l.target === 'object' ? l.target.id : l.target; return t === d.id; })
        .classed("dimmed", l => { const t = typeof l.target === 'object' ? l.target.id : l.target; return t !== d.id; });
      nodeSel.classed("dimmed", n => { if (n.id === d.id) return false; return !connIds.has(n.id); });
      let citeHtml = CITATIONS[d.name] ? `<div class="tip-cite">${CITATIONS[d.name]}</div>` : '';
      tooltip.html(`<div class="tip-name">${d.name}</div><div style="font-size:11px;color:#777">${connIds.size} members shown</div>${citeHtml}`).style("opacity", 1);
    }
  })
  .on("mousemove", (event) => { tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px"); })
  .on("mouseout", () => {
    linkSel.classed("highlighted", false).classed("dimmed", false);
    nodeSel.classed("dimmed", false);
    tooltip.style("opacity", 0);
  });

  simulation.on("tick", () => {
    linkSel.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

update();
</script>
</body>
</html>
