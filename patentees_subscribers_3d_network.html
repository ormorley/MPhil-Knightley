<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ffffff;
  color: #1a1a2e;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  height: 100vh;
}

#container { position: relative; width: 100vw; height: 100vh; }
canvas { display: block; }

#controls {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 12px;
  padding: 20px;
  width: 290px;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  z-index: 10;
  transition: transform 0.3s ease, opacity 0.25s ease;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
}

#controls h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 2px;
}

#controls .subtitle {
  font-size: 11px;
  color: #777;
  margin-bottom: 16px;
  font-weight: 300;
}

.control-group { margin-bottom: 14px; }

.control-group label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: #555;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.slider-row { display: flex; align-items: center; gap: 10px; }

.slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: #d4d4d4;
  border-radius: 2px;
  outline: none;
}

.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #6b3a2a;
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.slider-value {
  font-size: 13px;
  font-weight: 600;
  color: #6b3a2a;
  min-width: 20px;
  text-align: right;
}

#search-box {
  width: 100%;
  background: #f5f5f5;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 12px;
  color: #1a1a2e;
  outline: none;
  font-family: 'DM Sans', sans-serif;
}

#search-box:focus { border-color: #6b3a2a; }
#search-box::placeholder { color: #aaa; }

.company-toggles { display: flex; flex-direction: column; gap: 5px; }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}

.toggle-row:hover { background: rgba(0,0,0,0.03); }

.toggle-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 2px solid;
  transition: all 0.2s;
}

.toggle-dot.active { box-shadow: 0 0 6px; }

.toggle-label { font-size: 11.5px; font-weight: 400; color: #2a2a2a; }
.toggle-count { margin-left: auto; font-size: 10px; color: #999; font-weight: 300; }

/* Button row styles */
.btn-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.ctrl-btn {
  flex: 1;
  min-width: 0;
  padding: 7px 10px;
  font-size: 10.5px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #f5f5f5;
  color: #444;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  letter-spacing: 0.3px;
}

.ctrl-btn:hover { background: #eaeaea; border-color: #bbb; }

.ctrl-btn.active {
  background: #6b3a2a;
  color: #fff;
  border-color: #6b3a2a;
}

.ctrl-btn.active:hover {
  background: #5a3020;
}

#stats {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  padding: 12px 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  z-index: 10;
}

#stats span { font-size: 12px; color: #777; font-weight: 300; }
#stats span strong { color: #6b3a2a; font-weight: 600; }

#hint {
  position: absolute;
  bottom: 60px;
  right: 20px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  padding: 12px 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  z-index: 10;
  font-size: 11px;
  color: #999;
}

/* Legend */
#legend {
  position: absolute;
  bottom: 20px;
  right: 20px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  padding: 14px 18px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  min-width: 160px;
}

#legend.visible {
  opacity: 1;
  pointer-events: auto;
}

#legend .legend-title {
  font-size: 10px;
  font-weight: 600;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
}

#legend .legend-bar {
  width: 100%;
  height: 12px;
  border-radius: 3px;
  margin-bottom: 6px;
}

#legend .legend-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #777;
  font-weight: 400;
}

#legend .legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}

#legend .legend-swatch {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

#legend .legend-item-label {
  font-size: 11px;
  color: #555;
  font-weight: 400;
}

#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(255,255,255,0.97);
  border: 1px solid #c0c0c0;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #1a1a2e;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.12s;
  max-width: 420px;
}

#tooltip .tip-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 4px;
}

#tooltip .tip-companies { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

#tooltip .tip-tag {
  font-size: 9.5px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}

#tooltip .tip-cite {
  margin-top: 6px;
  font-size: 11px;
  color: #555;
  line-height: 1.5;
  border-top: 1px solid #e0e0e0;
  padding-top: 6px;
}

#toggle-controls {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 11;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  font-size: 18px;
  color: #555;
  transition: background 0.15s;
  user-select: none;
}

#toggle-controls:hover { background: #f0f0f0; }

#controls.hidden {
  transform: translateX(-310px);
  opacity: 0;
  pointer-events: none;

#label-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
  overflow: hidden;
}

.node-label {
  position: absolute;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
  pointer-events: none;
  transition: opacity 0.15s;

.node-label.company-label {

  font-size: 13px;
  font-weight: 700;
  color: #1a1a2e;
  text-shadow: 0 0 4px rgba(255,255,255,0.95), 0 0 8px rgba(255,255,255,0.8);

.node-label.person-label {
  font-size: 9.5px;
  font-weight: 400;
  color: #444;
  text-shadow: 0 0 3px rgba(255,255,255,0.95), 0 0 6px rgba(255,255,255,0.8);
}

      </div>
    </div>

    <div class="control-group">
      <label>Show Companies</label>
      <div class="company-toggles" id="toggles"></div>

  <div id="tooltip"></div>
</div>

// ── State ──
let showCompanyLabels = true;

// Connection-count colour scale (1–6): cool blue → warm amber → deep red
const CONNECTION_COLORS = [
  { count: 1, color: 0x94a3b8, hex: "#94a3b8", label: "1 company" },
  { count: 2, color: 0x6b9f36, hex: "#6b9f36", label: "2 companies" },
  { count: 3, color: 0xd4a017, hex: "#d4a017", label: "3 companies" },
  { count: 4, color: 0xe07020, hex: "#e07020", label: "4 companies" },
  { count: 5, color: 0xc0392b, hex: "#c0392b", label: "5 companies" },
  { count: 6, color: 0x7b1fa2, hex: "#7b1fa2", label: "6 companies" }
];

function getConnectionColor(count) {
  const idx = Math.max(0, Math.min(count - 1, CONNECTION_COLORS.length - 1));
  return CONNECTION_COLORS[idx];
}

// Build gradient for legend bar
function buildLegendGradient() {
  const stops = CONNECTION_COLORS.map((c, i) => {
    const pct = (i / (CONNECTION_COLORS.length - 1)) * 100;
    return `${c.hex} ${pct}%`;
  });
  return `linear-gradient(to right, ${stops.join(', ')})`;
}

  if (isDragging) {
    targetRotY += (e.clientX - prevMouse.x) * 0.005;
    targetRotX += (e.clientY - prevMouse.y) * 0.005;
    targetRotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotX));
    prevMouse = { x: e.clientX, y: e.clientY };
  }
});

  zoomDist = Math.max(100, Math.min(2000, zoomDist + e.deltaY * 0.5));

  mouse.x = (e.clientX / W) * 2 - 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const data = nodeDataMap.get(obj);
    if (data) {
      hoveredObj = obj;
      let html = `<div class="tip-name">${data.name}</div>`;
      if (data.type === "person") {
        html += `<div style="font-size:11px;color:#777;margin-bottom:4px">${data.companies.length} compan${data.companies.length === 1 ? 'y' : 'ies'}</div>`;
        html += `<div class="tip-companies">`;
        data.companies.forEach(c => {
          html += `<span class="tip-tag" style="background:${COMPANIES[c].hex}18; color:${COMPANIES[c].hex}; border:1px solid ${COMPANIES[c].hex}44">${c}</span>`;

        html += `</div>`;

        if (CITATIONS[data.name]) {
          html += `<div class="tip-cite">${CITATIONS[data.name]}</div>`;

// Simulation data
let simNodes = [];

function highlightConnections(data) {
  nodeMeshes.forEach(m => { m.material.opacity = 0.08; });
  linkLines.forEach(l => { l.material.opacity = 0.02; });
  hoveredObj.material.opacity = 1.0;

  if (data.type === "person") {
    const connectedCompanies = new Set(data.companies);
    nodeMeshes.forEach(m => {
      const d = nodeDataMap.get(m);
      if (d && d.type === "company" && connectedCompanies.has(d.name)) m.material.opacity = 1.0;
    });
    linkLines.forEach((l, i) => {
      if (simLinks[i] && simLinks[i]._sourceId === data.id) l.material.opacity = 0.6;
    });
  } else {
    linkLines.forEach((l, i) => {
      if (simLinks[i] && simLinks[i]._targetId === data.id) {
        l.material.opacity = 0.6;
        nodeMeshes.forEach(m => {
          const d = nodeDataMap.get(m);
          if (d && d.id === simLinks[i]._sourceId) m.material.opacity = 1.0;
        });
      }
    });
  }

  // Update label opacity to match
  updateLabelOpacity();
}

function clearHighlights() {
  nodeMeshes.forEach(m => {
    const d = nodeDataMap.get(m);
    if (d) m.material.opacity = d.type === "company" ? 0.95 : 0.85;
  });
  linkLines.forEach(l => { l.material.opacity = 0.25; });
  updateLabelOpacity();
}

// Force simulation
function simulate(nodes, links, iterations) {
  const compNames = Object.keys(COMPANIES).filter(c => activeCompanies.has(c));
  nodes.forEach((n, i) => {
    if (n.type === "company") {
      const ci = compNames.indexOf(n.name);
      const angle = (ci / compNames.length) * Math.PI * 2;
      const r = 180;
      n.x = Math.cos(angle) * r;
      n.y = Math.sin(angle) * r * 0.6;
      n.z = Math.sin(angle * 0.5) * 80;
    } else {
      const spread = 300;
      n.x = (Math.random() - 0.5) * spread;
      n.y = (Math.random() - 0.5) * spread;
      n.z = (Math.random() - 0.5) * spread;
    }
    n.vx = 0; n.vy = 0; n.vz = 0;
  });

  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  for (let iter = 0; iter < iterations; iter++) {
    const alpha = 0.3 * (1 - iter / iterations);
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
        let dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
        const force = (a.type === "company" || b.type === "company" ? 800 : 50) / (dist * dist);
        const fx = dx / dist * force * alpha;
        const fy = dy / dist * force * alpha;
        const fz = dz / dist * force * alpha;
        if (a.type !== "company") { a.vx += fx; a.vy += fy; a.vz += fz; }
        if (b.type !== "company") { b.vx -= fx; b.vy -= fy; b.vz -= fz; }
      }
    }
    links.forEach(l => {
      const s = nodeMap[l._sourceId], t = nodeMap[l._targetId];
      if (!s || !t) return;
      let dx = t.x - s.x, dy = t.y - s.y, dz = t.z - s.z;
      let dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
      const target = 120;
      const force = (dist - target) * 0.01 * alpha;
      const fx = dx / dist * force;
      const fy = dy / dist * force;
      const fz = dz / dist * force;
      if (s.type !== "company") { s.vx += fx; s.vy += fy; s.vz += fz; }
      if (t.type !== "company") { t.vx -= fx; t.vy -= fy; t.vz -= fz; }
    });
    nodes.forEach(n => {
      if (n.type !== "company") {
        n.vx -= n.x * 0.001 * alpha;
        n.vy -= n.y * 0.001 * alpha;
        n.vz -= n.z * 0.001 * alpha;
      }
    });
    nodes.forEach(n => {
      if (n.type !== "company") {
        n.x += n.vx; n.y += n.vy; n.z += n.vz;
        n.vx *= 0.6; n.vy *= 0.6; n.vz *= 0.6;
      }
    });
  }
}

function getNodeColor(n) {
  if (n.type === "company") return n.color;
  if (colorByConnections) {
    return getConnectionColor(n.companies.length).color;
  }
  return n.companies.length > 1 ? 0x6b3a2a : COMPANIES[n.companies[0]].color;
}

function update() {
  const filtered = allPersons.filter(p => {
    const relevant = p.companies.filter(c => activeCompanies.has(c));
    if (relevant.length === 0) return false;
    if (p.count < minCompanies) return false;
    if (searchTerm && !p.name.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  const usedCompanies = new Set();
  filtered.forEach(p => p.companies.forEach(c => { if (activeCompanies.has(c)) usedCompanies.add(c); }));

  const companyNodes = [...usedCompanies].map(c => ({
    id: `company_${c}`, name: c, type: "company", color: COMPANIES[c].color, hex: COMPANIES[c].hex
  }));

  const personNodes = filtered.map(p => ({
    id: `person_${p.name}`, name: p.name, type: "person", count: p.count,
    companies: p.companies.filter(c => activeCompanies.has(c))
  }));

  simNodes = [...companyNodes, ...personNodes];
  simLinks = [];
  personNodes.forEach(p => {
    p.companies.forEach(c => {
      simLinks.push({ _sourceId: p.id, _targetId: `company_${c}`, color: COMPANIES[c].color });
    });
  });

  document.getElementById('stat-nodes').textContent = personNodes.length;
  document.getElementById('stat-links').textContent = simLinks.length;

  simulate(simNodes, simLinks, 150);

  // Clear old meshes
  while (nodeGroup3D.children.length) nodeGroup3D.remove(nodeGroup3D.children[0]);
  while (linkGroup3D.children.length) linkGroup3D.remove(linkGroup3D.children[0]);
  nodeMeshes = [];
  nodeDataMap = new Map();
  linkLines = [];

  const nodeMap = {};
  simNodes.forEach(n => nodeMap[n.id] = n);

  simLinks.forEach(l => {
    const s = nodeMap[l._sourceId], t = nodeMap[l._targetId];
    if (!s || !t) return;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(s.x, s.y, s.z),
      new THREE.Vector3(t.x, t.y, t.z)
    ]);
    const mat = new THREE.LineBasicMaterial({ color: l.color, transparent: true, opacity: 0.25 });
    const line = new THREE.Line(geo, mat);
    linkGroup3D.add(line);
    linkLines.push(line);
  });

  simNodes.forEach(n => {
    let radius, color, opacity;
    if (n.type === "company") {
      radius = 12;
      color = n.color;
      opacity = 0.95;
    } else {
      radius = 1.5 + n.count * 1.2;
      color = getNodeColor(n);
      opacity = 0.85;
    }
    const geo = new THREE.SphereGeometry(radius, n.type === "company" ? 24 : 12, n.type === "company" ? 24 : 12);
    const mat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity, shininess: 40 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(n.x, n.y, n.z);
    nodeGroup3D.add(mesh);
    nodeMeshes.push(mesh);
    nodeDataMap.set(mesh, n);
  });

  // Rebuild labels
  rebuildLabels();
}

// ── Labels ──
const labelLayer = document.getElementById('label-layer');
let labelEls = [];

function rebuildLabels() {
  // Clear
  labelLayer.innerHTML = '';
  labelEls = [];

  simNodes.forEach(n => {
    const show = (n.type === "company" && showCompanyLabels) || (n.type === "person" && showPersonLabels);
    if (!show) return;

    const el = document.createElement('div');
    el.className = `node-label ${n.type === "company" ? "company-label" : "person-label"}`;
    el.textContent = n.name;
    el.dataset.nodeId = n.id;
    labelLayer.appendChild(el);
    labelEls.push({ el, node: n });
  });
}

function updateLabels() {
  labelEls.forEach(({ el, node }) => {
    const pos = new THREE.Vector3(node.x, node.y, node.z);
    pos.project(camera);

    if (pos.z > 1) {
      el.style.display = 'none';
      return;
    }

    const x = (pos.x * 0.5 + 0.5) * W;
    const y = (-pos.y * 0.5 + 0.5) * H;

    el.style.display = '';
    el.style.left = (x + (node.type === "company" ? 16 : 8)) + 'px';
    el.style.top = (y - 6) + 'px';
  });
}

function updateLabelOpacity() {
  if (!hoveredObj) {
    labelEls.forEach(({ el }) => { el.style.opacity = '1'; });
    return;
  }
  const hovData = nodeDataMap.get(hoveredObj);
  if (!hovData) return;

  labelEls.forEach(({ el, node }) => {
    // Check if this label's node is highlighted
    const mesh = nodeMeshes.find(m => nodeDataMap.get(m) && nodeDataMap.get(m).id === node.id);
    if (mesh && mesh.material.opacity > 0.5) {
      el.style.opacity = '1';
    } else {
      el.style.opacity = '0.1';
    }
  });
}

// ── Legend ──
const legendEl = document.getElementById('legend');
const legendBar = document.getElementById('legend-bar');

function updateLegend() {
  if (colorByConnections) {
    legendEl.classList.add('visible');
    // Build discrete swatches instead of gradient for clarity
    const maxCount = Math.max(...allPersons.map(p => p.count), 1);
    let html = '<div class="legend-title">Connections</div>';
    for (let i = 0; i < Math.min(maxCount, CONNECTION_COLORS.length); i++) {
      const c = CONNECTION_COLORS[i];
      html += `<div class="legend-item">
        <div class="legend-swatch" style="background:${c.hex}"></div>
        <span class="legend-item-label">${c.label}</span>
      </div>`;
    }
    legendEl.innerHTML = html;
  } else {
    legendEl.classList.remove('visible');
  }
}

// ── Button handlers ──
const btnLabelCompanies = document.getElementById('btn-label-companies');
const btnLabelPeople = document.getElementById('btn-label-people');
const btnColorCompany = document.getElementById('btn-color-company');
const btnColorConnections = document.getElementById('btn-color-connections');

btnLabelCompanies.addEventListener('click', () => {
  showCompanyLabels = !showCompanyLabels;
  btnLabelCompanies.classList.toggle('active', showCompanyLabels);
  rebuildLabels();
});

btnLabelPeople.addEventListener('click', () => {
  showPersonLabels = !showPersonLabels;
  btnLabelPeople.classList.toggle('active', showPersonLabels);
  rebuildLabels();
});

btnColorCompany.addEventListener('click', () => {
  colorByConnections = false;
  btnColorCompany.classList.add('active');
  btnColorConnections.classList.remove('active');
  recolorNodes();
  updateLegend();
});

btnColorConnections.addEventListener('click', () => {
  colorByConnections = true;
  btnColorConnections.classList.add('active');
  btnColorCompany.classList.remove('active');
  recolorNodes();
  updateLegend();
});

function recolorNodes() {
  nodeMeshes.forEach(m => {
    const d = nodeDataMap.get(m);
    if (d) {
      m.material.color.set(getNodeColor(d));
    }
  });
}

// ── Company toggles ──
const togglesDiv = document.getElementById('toggles');
for (const [name, data] of Object.entries(COMPANIES)) {
  const row = document.createElement('div');
  row.className = 'toggle-row';
  const dot = document.createElement('div');
  dot.className = 'toggle-dot active';
  dot.style.borderColor = data.hex;
  dot.style.background = data.hex;
  dot.style.boxShadow = `0 0 6px ${data.hex}`;
  const label = document.createElement('span');
  label.className = 'toggle-label';
  label.textContent = name;
  const count = document.createElement('span');
  count.className = 'toggle-count';
  count.textContent = new Set(raw[name]).size;
  row.appendChild(dot);
  row.appendChild(label);
  row.appendChild(count);
  row.addEventListener('click', () => {
    if (activeCompanies.has(name)) {
      activeCompanies.delete(name);
      dot.classList.remove('active');
      dot.style.background = 'transparent';
      dot.style.boxShadow = 'none';
    } else {
      activeCompanies.add(name);
      dot.classList.add('active');
      dot.style.background = data.hex;
      dot.style.boxShadow = `0 0 6px ${data.hex}`;
    }
    update();
    updateLegend();
  });
  togglesDiv.appendChild(row);
}

document.getElementById('min-slider').addEventListener('input', function() {
  minCompanies = +this.value;
  document.getElementById('min-value').textContent = this.value;
  update();
});

document.getElementById('search-box').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase();
  update();
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;

  camera.position.x = Math.sin(rotY) * Math.cos(rotX) * zoomDist;
  camera.position.y = Math.sin(rotX) * zoomDist;
  camera.position.z = Math.cos(rotY) * Math.cos(rotX) * zoomDist;
  camera.lookAt(0, 0, 0);

  updateLabels();

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
});

update();
updateLegend();
animate();
</script>
</body>
</html>
